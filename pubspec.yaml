name: nawassco
description: NAWASSCO Cross Platform Portal
publish_to: 'none'
version: 1.0.0
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & Auth
  dio: ^5.7.0
  dio_cookie_manager: ^3.3.0
  cookie_jar: ^4.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Storage
  shared_preferences: ^2.3.2

  # Routing
  go_router: ^17.0.0

  # UI & Animations
  lottie: ^3.3.1
  fl_chart: ^0.68.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  overlay_support: ^2.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.0
  crypto: ^3.0.5

  # Media & Files
  image_picker: ^1.2.1
  image_gallery_saver: ^2.0.3
  path_provider: ^2.1.5
  share_plus: ^10.0.3

  # QR & Permissions
  mobile_scanner: ^6.0.0
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0

  # Environment
  flutter_dotenv: ^5.2.1

  # Launch URLs
  url_launcher: ^6.3.2
  file_picker: ^10.3.7
  open_file: ^3.5.10
  syncfusion_flutter_charts: ^31.1.19
  syncfusion_flutter_gauges: ^31.1.19
  sqflite: ^2.4.2
  path: ^1.9.1
  liquid_pull_to_refresh: ^3.0.1
  seo_renderer: ^0.6.0
  universal_html: ^2.2.4
  video_player: ^2.10.1
  chewie: ^1.13.0
  photo_view: ^0.15.0
  syncfusion_flutter_pdfviewer: ^31.1.19
  open_filex: ^4.7.0
  equatable: ^2.0.7
  image: ^4.5.4
  iconsax: ^0.0.8
  timeago: ^3.7.1
  freezed_annotation: ^3.1.0
  flutter_markdown: ^0.7.7+1
  audioplayers: ^6.5.1
  google_maps_flutter: ^2.14.0
  device_info_plus: ^11.5.0
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  universal_io: ^2.3.1
  material_design_icons_flutter: ^7.0.7296
  flutter_typeahead: ^4.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/nawassco_logo.png